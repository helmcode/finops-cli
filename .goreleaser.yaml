version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - binary: finops
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: helmcode
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/helmcode/finops-cli"
    description: "Cloud FinOps CLI for cost analysis, anomaly detection, and optimization"
    license: "MIT"
    install: |
      bin.install "finops"
    test: |
      system bin/"finops", "version"

release:
  github:
    owner: helmcode
    name: finops-cli
