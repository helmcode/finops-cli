<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - FinOps Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1117;
            color: #e5e7eb;
            padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        .header {
            background: linear-gradient(135deg, #6c62ff 0%, #8b7fff 100%);
            color: white;
            padding: 2.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 24px rgba(108, 98, 255, 0.3);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .card h2 {
            font-size: 1.2rem;
            color: #e5e7eb;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* Metrics */
        .metrics-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .metric {
            flex: 1;
            min-width: 180px;
            padding: 1.25rem 1.5rem;
            background: rgba(108, 98, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(108, 98, 255, 0.2);
        }
        .metric .value {
            font-size: 2rem;
            font-weight: 700;
            color: #8b7fff;
            letter-spacing: -0.02em;
        }
        .metric .label {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-top: 0.25rem;
            font-weight: 500;
        }

        /* Tables */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(255, 255, 255, 0.05);
            color: #9ca3af;
            text-align: left;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            color: #d1d5db;
        }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        td code {
            background: rgba(108, 98, 255, 0.12);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #9089fc;
            word-break: break-all;
        }

        /* Charts */
        .chart-container { position: relative; height: 400px; margin: 1rem 0; }

        /* Color indicators */
        .positive { color: #ff5f57; font-weight: 600; }
        .negative { color: #22c55e; font-weight: 600; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-high { background: rgba(255, 95, 87, 0.15); color: #ff5f57; }
        .badge-medium { background: rgba(243, 156, 18, 0.15); color: #f39c12; }
        .badge-low { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

        /* Collapsible sections */
        .collapsible {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.15s ease;
        }
        .collapsible:hover { background: rgba(255, 255, 255, 0.04); }
        .collapsible .arrow {
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
            border-radius: 6px;
            background: rgba(108, 98, 255, 0.15);
            color: #8b7fff;
            font-size: 0.7rem;
            font-weight: 700;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }
        .collapsible.active .arrow { transform: rotate(90deg); }
        .collapsible-content {
            display: none;
            padding: 0;
            overflow-x: auto;
        }
        .collapsible-content.show { display: block; }
        .collapsible-content table { margin: 0; min-width: 600px; }
        .collapsible-content th {
            background: rgba(108, 98, 255, 0.08);
            font-size: 0.75rem;
        }
        .collapsible-content td {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .collapsible .region-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }
        .collapsible .region-name {
            font-weight: 600;
            color: #e5e7eb;
        }
        .collapsible .region-cost {
            font-weight: 700;
            color: #8b7fff;
        }
        .collapsible .resource-count {
            font-size: 0.8rem;
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.06);
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            white-space: nowrap;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2.5rem;
            color: #6b7280;
            font-size: 0.85rem;
        }
        .footer a {
            color: #8b7fff;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header { padding: 1.5rem; }
            .metrics-row { flex-direction: column; }
            .metric .value { font-size: 1.5rem; }
        }

        /* Print / PDF page break rules */
        @media print {
            .header { break-inside: avoid; }
            .card h2 { break-after: avoid; }
            .metrics-row { break-inside: avoid; }
            .metric { break-inside: avoid; }
            .chart-container { break-inside: avoid; }
            tr { break-inside: avoid; }
            thead { display: table-header-group; }
            .collapsible { break-inside: avoid; break-after: avoid; }
            .collapsible-content { break-before: avoid; }
            .footer { break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{.Title}}</h1>
            <p>Generated on {{.GeneratedAt}} | Period: {{.PeriodStart}} to {{.PeriodEnd}}</p>
        </div>
        {{block "content" .}}{{end}}
        <div class="footer">
            Generated by <a href="https://github.com/helmcode/finops-cli">FinOps CLI</a>
        </div>
    </div>
    <script>
    // Chart.js dark mode defaults
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.06)';

    // Collapsible sections
    document.querySelectorAll('.collapsible').forEach(function(el) {
        el.addEventListener('click', function() {
            this.classList.toggle('active');
            var content = this.nextElementSibling;
            content.classList.toggle('show');
        });
    });
    </script>
</body>
</html>
