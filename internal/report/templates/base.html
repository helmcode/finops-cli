<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - FinOps Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .header p { opacity: 0.9; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 1.3rem; color: #444; margin-bottom: 1rem; border-bottom: 2px solid #667eea; padding-bottom: 0.5rem; }
        .metric { display: inline-block; padding: 1rem 1.5rem; background: #f0f2ff; border-radius: 8px; margin: 0.5rem; }
        .metric .value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .metric .label { font-size: 0.85rem; color: #666; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9ff; color: #555; text-align: left; padding: 0.75rem 1rem; font-weight: 600; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }
        .chart-container { position: relative; height: 400px; margin: 1rem 0; }
        .positive { color: #e74c3c; }
        .negative { color: #27ae60; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-high { background: #ffeaea; color: #e74c3c; }
        .badge-medium { background: #fff3e0; color: #f39c12; }
        .badge-low { background: #e8f5e9; color: #27ae60; }
        .footer { text-align: center; padding: 2rem; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{.Title}}</h1>
            <p>Generated on {{.GeneratedAt}} | Period: {{.PeriodStart}} to {{.PeriodEnd}}</p>
        </div>
        {{block "content" .}}{{end}}
        <div class="footer">
            Generated by FinOps CLI
        </div>
    </div>
</body>
</html>
