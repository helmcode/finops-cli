{{template "base.html" .}}
{{define "content"}}
<div class="card">
    <h2>Cost Trend{{if .Data.Service}} — {{.Data.Service}}{{end}}</h2>
    <div class="metrics-row">
        <div class="metric">
            <div class="value">${{formatMoney .Data.AvgMonthly}}</div>
            <div class="label">Monthly Average</div>
        </div>
        <div class="metric">
            <div class="value">{{.Data.Direction}}</div>
            <div class="label">Trend Direction</div>
        </div>
    </div>
    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: [{{range $i, $d := .Data.DataPoints}}{{if $i}},{{end}}"{{$d.Period}}"{{end}}],
        datasets: [{
            label: '{{if .Data.Service}}{{.Data.Service}}{{else}}Total Cost{{end}}',
            data: [{{range $i, $d := .Data.DataPoints}}{{if $i}},{{end}}{{printf "%.2f" $d.Amount}}{{end}}],
            borderColor: '#6c62ff',
            backgroundColor: 'rgba(108, 98, 255, 0.08)',
            fill: true,
            tension: 0.3,
            pointBackgroundColor: '#6c62ff',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(ctx) {
                        return '$' + ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    }
                }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    callback: function(v) { return '$' + v.toLocaleString('en-US'); }
                },
                grid: { color: 'rgba(108, 98, 255, 0.06)' }
            },
            x: {
                grid: { display: false }
            }
        }
    }
});
</script>
{{end}}
