{{template "base.html" .}}
{{define "content"}}
<div class="card">
    <h2>Cost Trend{{if .Data.Service}} — {{.Data.Service}}{{end}}</h2>
    <div class="metric">
        <div class="value">${{printf "%.2f" .Data.AvgMonthly}}</div>
        <div class="label">Monthly Average</div>
    </div>
    <div class="metric">
        <div class="value">{{.Data.Direction}}</div>
        <div class="label">Trend Direction</div>
    </div>
    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<script>
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: [{{range $i, $d := .Data.DataPoints}}{{if $i}},{{end}}"{{$d.Period}}"{{end}}],
        datasets: [{
            label: '{{if .Data.Service}}{{.Data.Service}}{{else}}Total Cost{{end}}',
            data: [{{range $i, $d := .Data.DataPoints}}{{if $i}},{{end}}{{printf "%.2f" $d.Amount}}{{end}}],
            borderColor: '#667eea',
            backgroundColor: 'rgba(102,126,234,0.1)',
            fill: true,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + v; } } } }
    }
});
</script>
{{end}}
